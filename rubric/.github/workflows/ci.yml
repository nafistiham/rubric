name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rubric/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rubric/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        working-directory: rubric
        run: cargo build --workspace

      - name: Test
        working-directory: rubric
        run: cargo test --workspace

      - name: Clippy
        working-directory: rubric
        run: cargo clippy --workspace -- -A warnings
